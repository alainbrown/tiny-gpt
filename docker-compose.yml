services:
  training:
    build: .
    volumes:
      - .:/app
    # Ensure any downloaded Hugging Face models/datasets are cached in a local directory
    environment:
      - HF_HOME=/app/.cache/huggingface
      - PYTHONUNBUFFERED=1
    profiles:
      - training
    command: >
      python train.py
      --context_size 512
      --d_model 256
      --n_layers 6
      --n_heads 8
      --batch_size 64
      --learning_rate 5e-4
      --eval_interval 5000
      --tokenizer_vocab_size 10000
      --tokenizer_train_stories 100000
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

  gradio:
    build: .
    volumes:
      - .:/app
    environment:
      - HF_HOME=/app/.cache/huggingface
      - PYTHONUNBUFFERED=1
      - MODEL_ID=${MODEL_ID:-alainbrown/tiny-gpt}
      - MODEL_REVISION=${MODEL_REVISION:-main}
    ports:
      - "7860:7860"
    command: python apps/gradio/app.py
    profiles:
      - gradio
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

  hub-export:
    build: .
    volumes:
      - .:/app
    environment:
      - HF_HOME=/app/.cache/huggingface
      - PYTHONUNBUFFERED=1
    profiles:
      - tools
    command: >
      python scripts/export_model.py
      --checkpoint checkpoints/tiny_gpt
      --output checkpoints/tiny_gpt_hub
