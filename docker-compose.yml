services:
  aim:
    image: aimstack/aim
    volumes:
      - aim-data:/opt/aim
    ports:
      - "43800:43800"
    profiles:
      - metrics

  tokenizer-training:
    build: .
    volumes:
      - .:/app
    environment:
      - HF_HOME=/app/.cache/huggingface
      - PYTHONUNBUFFERED=1
    profiles:
      - tools
    command: >
      python scripts/train_tokenizer.py
      --dataset skeskinen/TinyStories-hf
      --split train
      --text-column text
      --vocab-size 16000
      --output checkpoints/tiny_gpt/tokenizer.json

  training:
    build: .
    volumes:
      - .:/app
      - aim-data:/opt/aim
    # Ensure any downloaded Hugging Face models/datasets are cached in a local directory
    environment:
      - HF_HOME=/app/.cache/huggingface
      - PYTHONUNBUFFERED=1
    profiles:
      - training
    command: >
      python scripts/train.py
      --dataset skeskinen/TinyStories-hf
      --context_size 1024
      --d_model 384
      --n_layers 10
      --n_heads 6
      --dropout 0.0
      --batch_size 8
      --grad_accum_steps 16
      --learning_rate 3e-4
      --min_lr 3e-5
      --warmup_steps 1000
      --epochs 3
      --lr_decay_steps 11115
      --eval_interval 8000
      --eval_batches 100
      --chunk_size 100000
      --tokenizer_path checkpoints/tiny_gpt/tokenizer.json
      --aim_repo /opt/aim
      --aim_experiment storyteller
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

  gradio:
    build: .
    volumes:
      - .:/app
    environment:
      - HF_HOME=/app/.cache/huggingface
      - PYTHONUNBUFFERED=1
      - MODEL_ID=${MODEL_ID:-alainbrown/tiny-gpt}
      - MODEL_REVISION=${MODEL_REVISION:-main}
    ports:
      - "7860:7860"
    command: python apps/gradio/app.py
    profiles:
      - gradio
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

  hub-export:
    build: .
    volumes:
      - .:/app
    environment:
      - HF_HOME=/app/.cache/huggingface
      - PYTHONUNBUFFERED=1
    profiles:
      - tools
    command: >
      python scripts/export_model.py
      --checkpoint checkpoints/tiny_gpt
      --output checkpoints/tiny_gpt_hub

volumes:
  aim-data:
